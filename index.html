<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segredo Misterioso</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:
            radial-gradient(circle at center, #1b1b1b 0%, #050505 70%);
        overflow:hidden;
    }

    .container{
        text-align:center;
    }

    h1{
        color:#bbb;
        margin-bottom:30px;
        letter-spacing:3px;
        text-shadow:0 0 15px rgba(255,255,255,0.2);
    }

    button{
        padding:20px 50px;
        font-size:1.4rem;
        font-weight:bold;
        border:none;
        border-radius:999px;
        cursor:pointer;
        color:white;
        background:linear-gradient(45deg,#ff0066,#ff3300);
        box-shadow:
            0 0 20px #ff0066,
            0 0 40px #ff3300;
        transition:0.3s;
        animation:pulse 1.5s infinite;
    }

    button:hover{
        transform:scale(1.08);
    }

    @keyframes pulse{
        0%{transform:scale(1);}
        50%{transform:scale(1.08);}
        100%{transform:scale(1);}
    }

    .resultado{
        display:none;
        flex-direction:column;
        align-items:center;
        animation:aparecer 0.5s ease;
    }

    .emoji{
        font-size:12rem;
        margin-bottom:20px;
    }

    .msg{
        color:white;
        font-size:2rem;
        font-weight:bold;
        text-shadow:0 0 10px #fff;
    }

    @keyframes aparecer{
        from{
            opacity:0;
            transform:scale(0.5);
        }
        to{
            opacity:1;
            transform:scale(1);
        }
    }
</style>
</head>
<body>

<div class="container">
    <div id="inicio">
        <h1>VOCÊ TEM CERTEZA QUE QUER VER?</h1>
        <button onclick="revelar()">CLIQUE AQUI</button>
    </div>

    <div class="resultado" id="resultado">
        <div class="emoji">🖕</div>
        <div class="msg">
            nao acredito que tu caiu nisso KKKKKKKKK
        </div>
    </div>
</div>

<script>
function revelar(){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("resultado").style.display = "flex";
}
</script>

</body>
</html>
